# One-command local stack: SQL Server + API + Angular (nginx).
#   docker compose up --build
# Then: API → http://localhost:8080 (Swagger at /swagger), Web → http://localhost:8081
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: src/NorthStar.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      Database__Provider: "SqlServer"
      ConnectionStrings__Default: "Server=mssql,1433;Database=NorthStar;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
      Jwt__SigningKey: "docker-only-super-secret-signing-key-change-me-0123456789"
    ports:
      - "8080:8080"
    depends_on:
      mssql:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    ports:
      - "8081:80"
    depends_on:
      - api
